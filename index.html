<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyad Elite Portfolio</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #fff;
            --primary: #ff2e43;
        }

        body.light {
            --bg: #f5f5f5;
            --text: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: 0.3s;
        }

        /* NAV */
        .nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 15px 20px; z-index: 1000;
        }

        .btn {
            background: rgba(255,255,255,0.1);
            border: none; padding: 8px 12px;
            border-radius: 10px; color: var(--text);
            cursor: pointer; backdrop-filter: blur(5px);
        }

        /* HERO */
        .hero {
            height: 60vh;
            display: flex; justify-content: center;
            align-items: center; text-align: center;
        }

        .hero h1 { font-size: 60px; }
        .hero span { color: var(--primary); }

        /* SECTION */
        .section { padding: 40px 20px; max-width: 1000px; margin: auto; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px; border-radius: 20px;
            backdrop-filter: blur(15px);
        }

        h2 { color: var(--primary); margin-bottom: 15px; }

        /* معرض الأعمال - الصور هنا */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .projects-grid img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .projects-grid img:hover { transform: scale(1.05); border-color: var(--primary); }

        /* WHATSAPP */
        .whatsapp {
            position: fixed; bottom: 20px; left: 20px;
            background: #25D366; padding: 12px 20px;
            border-radius: 30px; color: white;
            text-decoration: none; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        @media(max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="nav">
    <button class="btn" onclick="toggleMode()">🌙/☀️</button>
    <button class="btn" onclick="toggleLang()">AR/EN</button>
</div>

<div class="hero">
    <div>
        <h1 id="title">E<span>y</span>ad</h1>
        <p id="job" style="color: #888;">Graphic Designer</p>
    </div>
</div>

<div class="section grid">
    <div class="card">
        <h2 id="aboutTitle">عنّي</h2>
        <p id="aboutText">أنا إياد، مصمم جرافيك من مصر شغوف بالإبداع وتطوير الهويات البصرية.</p>
    </div>
    <div class="card">
        <h2 id="skillsTitle">المهارات</h2>
        <p>Logo Design • Branding • Social Media Ads</p>
    </div>
</div>

<div class="section">
    <h2 id="projectsTitle">معرض الأعمال</h2>
    <div class="projects-grid">
        <img src="IMG-20260401-WA0006.jpg">
        <img src="IMG-20260401-WA0007.jpg">
        <img src="IMG-20260401-WA0008.jpg">
        <img src="IMG-20260401-WA0009.jpg">
        <img src="IMG-20260401-WA0010.jpg">
        <img src="IMG-20260401-WA0011.jpg">
        <img src="IMG-20260401-WA0012.jpg">
        <img src="IMG-20260401-WA0013.jpg">
        <img src="IMG-20260401-WA0014.jpg">
    </div>
</div>

<a class="whatsapp" href="https://wa.me/201125720733" target="_blank">تواصل معي / WhatsApp</a>

<script>
    function toggleMode() { document.body.classList.toggle('light'); }
    let isAr = true;
    function toggleLang() {
        isAr = !isAr;
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        document.getElementById('job').innerText = isAr ? 'مصمم جرافيك' : 'Graphic Designer';
        document.getElementById('aboutTitle').innerText = isAr ? 'عنّي' : 'About';
        document.getElementById('projectsTitle').innerText = isAr ? 'معرض الأعمال' : 'Portfolio';
    }
</script>

</body>
</html>
