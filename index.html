<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyad Pono | Creative Branding</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; /* أسود عميق */
            --primary: #ff2e43; /* الأحمر المميز */
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body.light {
            --bg: #f5f5f5; /* خلفية بيضاء للوضع الفاتح */
            --text: #1a1a1a;
            --card-bg: rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: 0.5s ease;
        }

        /* PREMIUM ANIMATIONS */
        @keyframes entrance {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }

        /* NAVIGATION - Minimal & Clean */
        .nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 15px 30px; z-index: 1000;
            background: rgba(3, 3, 3, 0.4); backdrop-filter: blur(12px);
        }

        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 18px; border-radius: 12px;
            color: var(--text); cursor: pointer; font-weight: bold;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; position: relative;
        }

        .logo-box {
            animation: entrance 1s cubic-bezier(0.17, 0.67, 0.83, 0.67) both;
        }

        .profile-logo {
            width: 140px; height: 140px;
            object-fit: cover; border-radius: 35px;
            margin-bottom: 25px; /* مسافة واضحة فوق الاسم */
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(255, 46, 67, 0.3);
            animation: floating 4s infinite ease-in-out;
        }

        .hero h1 { font-size: clamp(60px, 12vw, 90px); font-weight: 900; letter-spacing: -3px; }
        .hero h1 span { color: var(--primary); text-shadow: 0 0 20px rgba(255, 46, 67, 0.5); }
        .subtitle { font-size: 1.3rem; color: #888; margin-top: 5px; animation: entrance 1.5s ease-out both; }

        /* PORTFOLIO GRID */
        .section { padding: 100px 20px; max-width: 1200px; margin: auto; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; margin-top: 50px;
        }

        .card {
            background: var(--card-bg); border-radius: 25px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; transform: translateY(40px);
        }

        /* انيميشن عند السكرول */
        .card.reveal { opacity: 1; transform: translateY(0); transition-delay: calc(0.1s * var(--idx)); }

        .card img {
            width: 100%; height: 450px;
            object-fit: cover; transition: 0.6s ease;
        }

        .card:hover {
            transform: scale(1.03) translateY(-15px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .card:hover img { transform: scale(1.1); filter: contrast(1.1); }

        .card-details { padding: 20px; text-align: center; font-weight: bold; background: #1a1a1a; }

        /* CONTACT FLOAT */
        .whatsapp {
            position: fixed; bottom: 30px; left: 30px;
            background: #25D366; color: white; padding: 18px 28px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 1000; transition: 0.3s;
        }
        .whatsapp:hover { transform: scale(1.1); }

        @media(max-width: 768px) { .grid { grid-template-columns: 1fr; } .hero h1 { font-size: 50px; } }
    </style>
</head>
<body>

<div class="nav">
    <button class="btn" onclick="toggleMode()">🌙</button>
    <button class="btn" onclick="toggleLang()">EN / AR</button>
</div>

<header class="hero">
    <div class="logo-box">
        <img src="logo.jpg" alt="Logo" class="profile-logo">
    </div>
    <h1 id="title">E<span>y</span>ad</h1>
    <p id="job" class="subtitle">Creative Director | Branding Expert</p>
</header>

<main class="container">
    <h2 id="projectsTitle" style="font-size: 3rem; text-align: center; margin-bottom: 20px;">Featured Works</h2>
    <div class="grid">
        <div class="card" style="--idx:1"><img src="1.jpg"><div class="card-details">Brand Identity Design</div></div>
        <div class="card" style="--idx:2"><img src="2.jpg"><div class="card-details">Premium Visuals</div></div>
        <div class="card" style="--idx:3"><img src="3.jpg"><div class="card-details">Social Ads Campaign</div></div>
        <div class="card" style="--idx:4"><img src="4.jpg"><div class="card-details">Product Design</div></div>
        <div class="card" style="--idx:5"><img src="5.jpg"><div class="card-details">Marketing Graphics</div></div>
        <div class="card" style="--idx:6"><img src="6.jpg"><div class="card-details">Creative Art Concept</div></div>
        <div class="card" style="--idx:7"><img src="7.jpg"><div class="card-details">Elite Project</div></div>
    </div>
</main>

<a href="https://wa.me/201125720733" class="whatsapp" target="_blank">Let's Work Together</a>

<script>
    function toggleMode() { document.body.classList.toggle('light'); }

    let ar = false;
    function toggleLang() {
        ar = !ar;
        document.documentElement.dir = ar ? 'rtl' : 'ltr';
        document.getElementById('job').innerText = ar ? 'مصمم جرافيك | خبير هويات بصرية' : 'Creative Director | Branding Expert';
        document.getElementById('projectsTitle').innerText = ar ? 'أعمالي المميزة' : 'Featured Works';
    }

    // انيميشن الظهور عند السكرول
    function reveal() {
        var reveals = document.querySelectorAll(".card");
        for (var i = 0; i < reveals.length; i++) {
            var windowHeight = window.innerHeight;
            var elementTop = reveals[i].getBoundingClientRect().top;
            var elementVisible = 150;
            if (elementTop < windowHeight - elementVisible) { reveals[i].classList.add("reveal"); }
        }
    }
    window.addEventListener("scroll", reveal);
    window.onload = reveal; // تحميل الانيميشن في البداية
</script>

</body>
</html>
